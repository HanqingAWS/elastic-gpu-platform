<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="NLP-Platform">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".22"/>
      <stop offset=".5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- tile -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#g)"/>
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#sheen)"/>
  <rect x="2.75" y="2.75" width="58.5" height="58.5" rx="14.3" fill="none" stroke="#ffffff" stroke-opacity=".28" stroke-width="1.2"/>

  <!-- "N" as a node graph: two verticals + diagonal, nodes at the vertices -->
  <g stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)">
    <path d="M19 47 V17"/>
    <path d="M19 17 L45 47"/>
    <path d="M45 47 V17"/>
  </g>
  <g fill="#ffffff" filter="url(#glow)">
    <circle cx="19" cy="17" r="4.4"/>
    <circle cx="19" cy="47" r="4.4"/>
    <circle cx="45" cy="17" r="4.4"/>
    <circle cx="45" cy="47" r="4.4"/>
  </g>
  <g fill="#06b6d4">
    <circle cx="19" cy="17" r="1.7"/>
    <circle cx="45" cy="47" r="1.7"/>
  </g>
</svg>
